apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: ainative-config
spec:
  tracing:
    samplingRate: "1"
    otel:
      endpointAddress: host.docker.internal:4317
      isSecure: false
      protocol: grpc
  metric:
    enabled: true
  actors:
    stateStoreName: statestore
  workflow:
    stateStoreName: statestore
