name: ainative

services:
  redis:
    image: redis:7-alpine
    container_name: ainative-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - ainative
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: ainative-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ainative}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ainative}
      POSTGRES_DB: ${POSTGRES_DB:-ainative}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ainative
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ainative} -d ${POSTGRES_DB:-ainative}"]
      interval: 5s
      timeout: 3s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:1.64.0
    container_name: ainative-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    networks:
      - ainative

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: ainative-prometheus
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - ainative

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    container_name: ainative-api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-ainative}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ainative}
      POSTGRES_DB: ${POSTGRES_DB:-ainative}
      DAPR_HTTP_PORT: 3500
      DAPR_GRPC_PORT: 50001
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - ainative

  api-daprd:
    image: daprio/daprd:1.15.0
    container_name: ainative-api-daprd
    network_mode: "service:api"
    depends_on:
      - api
    command:
      - "./daprd"
      - "-app-id"
      - "api"
      - "-app-port"
      - "8000"
      - "-dapr-http-port"
      - "3500"
      - "-dapr-grpc-port"
      - "50001"
      - "-components-path"
      - "/components"
      - "-config"
      - "/config/config.yaml"
    volumes:
      - ./dapr/components/statestore.yaml:/components/statestore.yaml:ro
      - ./dapr/components/pubsub.yaml:/components/pubsub.yaml:ro
      - ./dapr/config:/config:ro

networks:
  ainative:
    name: ainative

volumes:
  redis_data:
  postgres_data:
