name: ainative

services:
  redis:
    image: redis:7-alpine
    container_name: ainative-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - ainative
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: ainative-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ainative}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ainative}
      POSTGRES_DB: ${POSTGRES_DB:-ainative}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ainative
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ainative} -d ${POSTGRES_DB:-ainative}"]
      interval: 5s
      timeout: 3s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:1.64.0
    container_name: ainative-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    networks:
      - ainative

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: ainative-prometheus
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - ainative

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    container_name: ainative-api
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-ainative}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ainative}
      POSTGRES_DB: ${POSTGRES_DB:-ainative}
      DAPR_HTTP_PORT: 3500
      DAPR_GRPC_PORT: 50001
      WORKFLOW_DAPR_GRPC_HOST: worker
      WORKFLOW_DAPR_GRPC_PORT: 50001
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      MCP_SERVER_URL: http://mcp-server:8001
      MCP_SERVICE_INVOCATION_APP_ID: mcp-server
      MCP_USE_DAPR_INVOCATION: ${MCP_USE_DAPR_INVOCATION:-true}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      worker-daprd:
        condition: service_started
      mcp-server-daprd:
        condition: service_started
    networks:
      - ainative

  api-daprd:
    image: daprio/daprd:1.15.0
    container_name: ainative-api-daprd
    network_mode: "service:api"
    depends_on:
      - api
      - placement
      - scheduler
    command:
      - "./daprd"
      - "-app-id"
      - "api"
      - "-app-port"
      - "8000"
      - "-dapr-http-port"
      - "3500"
      - "-dapr-grpc-port"
      - "50001"
      - "-components-path"
      - "/components"
      - "-config"
      - "/config/config.yaml"
      - "-placement-host-address"
      - "placement:50005"
      - "-scheduler-host-address"
      - "scheduler:50006"
    volumes:
      - ./dapr/components/statestore.yaml:/components/statestore.yaml:ro
      - ./dapr/components/pubsub.yaml:/components/pubsub.yaml:ro
      - ./dapr/config:/config:ro

  mcp-server:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.mcp-server
    container_name: ainative-mcp-server
    ports:
      - "${MCP_SERVER_PORT:-8001}:8001"
    environment:
      MCP_SERVER_HOST: 0.0.0.0
      MCP_SERVER_PORT: 8001
      READONLY_SQL_DSN: ${READONLY_SQL_DSN:-postgresql://ainative_readonly:ainative_readonly@postgres:5432/ainative}
      READONLY_SQL_TIMEOUT_SECONDS: ${READONLY_SQL_TIMEOUT_SECONDS:-5}
      READONLY_SQL_MAX_ROWS: ${READONLY_SQL_MAX_ROWS:-100}
      BOCHA_API_KEY: ${BOCHA_API_KEY:-}
      BOCHA_SEARCH_URL: ${BOCHA_SEARCH_URL:-https://api.bochaai.com/v1/web-search}
      WEB_SEARCH_TIMEOUT_SECONDS: ${WEB_SEARCH_TIMEOUT_SECONDS:-5}
      CODE_RUNNER_IMAGE: ${CODE_RUNNER_IMAGE:-python:3.12-alpine}
      CODE_RUNNER_TIMEOUT_SECONDS: ${CODE_RUNNER_TIMEOUT_SECONDS:-5}
      CODE_RUNNER_MEMORY_LIMIT: ${CODE_RUNNER_MEMORY_LIMIT:-128m}
      CODE_RUNNER_CPU_LIMIT: ${CODE_RUNNER_CPU_LIMIT:-0.5}
    volumes:
      # `code_runner` shells out to the *host* Docker daemon to launch
      # one-shot, network-less sandbox containers (see
      # `mcp_server/tools/code_runner.py`); this is the only container in
      # the stack that mounts the Docker socket, and it never mounts the
      # project directory, other secrets, or forwards this socket into the
      # sandbox containers it spawns.
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ainative

  mcp-server-daprd:
    image: daprio/daprd:1.15.0
    container_name: ainative-mcp-server-daprd
    network_mode: "service:mcp-server"
    depends_on:
      - mcp-server
      - placement
      - scheduler
    command:
      - "./daprd"
      - "-app-id"
      - "mcp-server"
      - "-app-port"
      - "8001"
      - "-dapr-http-port"
      - "3500"
      - "-dapr-grpc-port"
      - "50001"
      - "-components-path"
      - "/components"
      - "-config"
      - "/config/config.yaml"
      - "-placement-host-address"
      - "placement:50005"
      - "-scheduler-host-address"
      - "scheduler:50006"
    volumes:
      - ./dapr/components/statestore.yaml:/components/statestore.yaml:ro
      - ./dapr/components/pubsub.yaml:/components/pubsub.yaml:ro
      - ./dapr/config:/config:ro

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    container_name: ainative-web
    ports:
      - "${WEB_PORT:-5173}:80"
    depends_on:
      - api
    networks:
      - ainative

  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    command: ["/app/infra/docker/docker-entrypoint-worker.sh"]
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-ainative}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ainative}
      POSTGRES_DB: ${POSTGRES_DB:-ainative}
      DAPR_HTTP_PORT: 3500
      DAPR_GRPC_PORT: 50001
      DAPR_APP_ID: worker
      DAPR_COMPONENTS_PATH: /dapr/components
      DAPR_CONFIG_PATH: /dapr/config/config.yaml
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      MCP_SERVER_URL: http://mcp-server:8001
      MCP_SERVICE_INVOCATION_APP_ID: mcp-server
      MCP_USE_DAPR_INVOCATION: ${MCP_USE_DAPR_INVOCATION:-true}
    volumes:
      - ./dapr/components:/dapr/components:ro
      - ./dapr/config:/dapr/config:ro
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mcp-server-daprd:
        condition: service_started
    networks:
      - ainative

  worker-daprd:
    image: daprio/daprd:1.15.0
    network_mode: "service:worker"
    depends_on:
      - worker
      - placement
      - scheduler
    command:
      - "./daprd"
      - "-app-id"
      - "worker"
      - "-dapr-http-port"
      - "3500"
      - "-dapr-grpc-port"
      - "50001"
      - "-components-path"
      - "/components"
      - "-config"
      - "/config/config.yaml"
      - "-placement-host-address"
      - "placement:50005"
      - "-scheduler-host-address"
      - "scheduler:50006"
    volumes:
      - ./dapr/components/statestore.yaml:/components/statestore.yaml:ro
      - ./dapr/components/pubsub.yaml:/components/pubsub.yaml:ro
      - ./dapr/config:/config:ro

  placement:
    image: daprio/placement:1.15.0
    command:
      - "./placement"
      - "--listen-address"
      - "0.0.0.0"
      - "--port"
      - "50005"
    networks:
      - ainative

  scheduler:
    image: daprio/scheduler:1.15.0
    command:
      - "./scheduler"
      - "--listen-address"
      - "0.0.0.0"
      - "--port"
      - "50006"
      - "--etcd-data-dir"
      - "/tmp/dapr-scheduler"
      - "--override-broadcast-host-port"
      - "scheduler:50006"
    networks:
      - ainative

networks:
  ainative:
    name: ainative

volumes:
  redis_data:
  postgres_data:
